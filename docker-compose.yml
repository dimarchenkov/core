services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./storage:/app/storage

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["uv", "run", "python", "-m", "core.worker"]
    env_file:
      - .env.example
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  angie:
    image: docker.angie.software/angie:1.10.2-alpine
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./docker/angie/angie.conf:/etc/angie/http.d/default.conf:ro

volumes:
  postgres_data:
